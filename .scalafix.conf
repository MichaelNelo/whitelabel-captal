rules = [
  OrganizeImports,
  RemoveUnused
]

OrganizeImports {
  groupedImports = Merge
  groups = [
    "re:javax?\\."
    "scala."
    "*"
  ]
  removeUnused = true
  targetDialect = Scala3
}

RemoveUnused {
  imports = true
  privates = true
  locals = true
  patternvars = true
  params = true
}

# Convenciones de estilo (no enforzables automaticamente):
# - Evitar type annotations innecesarias en variables locales
# - Evitar type annotations en retornos de funciones privadas
# - Solo tipar retornos de metodos publicos de APIs