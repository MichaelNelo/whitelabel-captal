database {
  jdbcUrl = "jdbc:rqlite:http://localhost:4001"
  jdbcUrl = ${?DB_URL}
}

server {
  host = "0.0.0.0"
  host = ${?SERVER_HOST}
  port = 8080
  port = ${?SERVER_PORT}
  # Dev mode: serve static assets from filesystem
  # In production, a reverse proxy (nginx) serves static files
  dev-mode = true
  dev-mode = ${?SERVER_DEV_MODE}
  # Enable dev API endpoints (e.g. /api/dev/reset-phase)
  dev-endpoints = true
  dev-endpoints = ${?SERVER_DEV_ENDPOINTS}
}
