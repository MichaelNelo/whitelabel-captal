version = "3.10.4"
runner.dialect = scala3
maxColumn = 100

# Scala 3 indentation syntax (usar : en vez de {})
rewrite.scala3.convertToNewSyntax = true
rewrite.scala3.removeOptionalBraces = oldSyntaxToo
rewrite.scala3.countEndMarkerLines = all
rewrite.scala3.insertEndMarkerMinLines = 20

# Eliminar braces y parentesis redundantes agresivamente
rewrite.rules = [
  RedundantBraces,
  RedundantParens,
  SortModifiers,
  PreferCurlyFors
]
rewrite.redundantBraces.stringInterpolation = true
rewrite.redundantBraces.ifElseExpressions = true
rewrite.redundantBraces.generalExpressions = true
rewrite.redundantBraces.methodBodies = true

# Preferir distribucion vertical
newlines.source = unfold
newlines.topLevelBodyIfMinStatements = []
newlines.beforeTemplateBodyIfBreakInParentCtors = false

# Parentesis finales NO en su propia linea
danglingParentheses.defnSite = false
danglingParentheses.callSite = false
danglingParentheses.ctrlSite = false

# Alineacion
align.preset = more
align.tokens."+" = [
  { code = "<-", owners = [{ regex = "Enumerator.Generator" }] },
  { code = "=", owners = [{ regex = "Enumerator.Val" }] },
  { code = "=>", owners = [{ regex = "Case" }] }
]

# Imports
rewrite.imports.sort = scalastyle
