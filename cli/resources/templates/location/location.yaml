name: "{{slug}}"
# REQUIRED for UCG → captive portal routing. The dispatcher Lambda behind
# Global Accelerator looks up this slug by querying `SELECT slug FROM locations
# WHERE ap_mac = ?` against rqlite. Without ap_mac set, devices hitting the
# captive portal get HTTP 404 ("No location registered for AP ...").
# Get the MAC from UniFi: Devices → click AP → Details → MAC Address.
# ap_mac: "AA:BB:CC:DD:EE:FF"
# desiredCount: 1
# unifi:
#   host: "192.168.1.1"           # IP/host del UCG en la LAN (alcanzable via tailnet)
#   apiToken: "YOUR_API_KEY"      # Settings → Control Plane → Integrations → Create API Key
#   port: 443                     # default 443 (Integration v1 vive bajo HTTPS estándar)
#   siteId: "00000000-0000-..."   # UUID del site (NO el nombre "default"). Descubrir con:
#                                 #   curl https://<ucg>:443/proxy/network/integration/v1/sites \
#                                 #     -H "X-API-KEY:<token>" -k
#   defaultDurationMinutes: 1440  # cuanto dura la autorizacion (24h por default)
