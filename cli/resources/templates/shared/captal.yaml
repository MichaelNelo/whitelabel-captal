aws:
  region: us-east-1
  # accessKeyId: AKIA...         # optional, falls back to env/AWS profile
  # secretAccessKey: ...         # optional
  # sessionToken: ...            # optional, for temporary credentials

images:
  # Base images pushed by the project release flow:
  api: "{{api_image_uri}}"           # e.g. <account>.dkr.ecr.us-east-1.amazonaws.com/captal-api:v1.0.0
  provision: "{{provision_image_uri}}"
  # Repos for derived images built by the CLI (no tag, the CLI generates one per push):
  shared: "{{shared_image_repo}}"     # e.g. <account>.dkr.ecr.us-east-1.amazonaws.com/captal-shared
  locations: "{{locations_image_repo}}"

s3:
  bucket: "{{s3_bucket}}"
  bundlePrefix: "bundle/"

ecs:
  cluster: "{{ecs_cluster}}"
  cpu: "256"
  memory: "512"
  desiredCount: 1
  subnets:
    - "{{subnet}}"
  securityGroups:
    - "{{security_group}}"
  executionRoleArn: "{{execution_role_arn}}"
  # taskRoleArn: ""              # optional

alb:
  listenerArn: "{{alb_listener_arn}}"
  vpcId: "{{vpc_id}}"
  domain: captal.app
  healthCheckPath: /health

cloudfront:
  distributionId: "{{cloudfront_distribution_id}}"

database:
  url: "{{db_url}}"

server:
  devMode: false
  devEndpoints: false

unifi:
  # Optional. URL of the HTTP proxy that routes UniFi Controller traffic.
  # Required in production where the API runs on ECS Fargate and reaches
  # the on-premise UCG via Tailscale subnet router + tinyproxy.
  # Example: "http://tinyproxy.captal-dev.local:8888"
  # Empty/omitted → direct connection (only viable on the same LAN).
  proxyUrl: ""
